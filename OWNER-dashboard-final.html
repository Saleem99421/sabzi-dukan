<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚙️ Owner Dashboard — Sabzi Dukan</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--g1:#1a3a2a;--g2:#2d6a4f;--g3:#40916c;--g4:#74c69d;--acc:#f4a261;--bg:#0d1f17;--card:#162a1e;--card2:#1e3829;--text:#e8f5ee;--muted:#7aad8f;--border:#2d5040;--wa:#25d366;--red:#e63946;--radius:14px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora','Noto Sans Devanagari',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,var(--g1),var(--g2));padding:14px 20px;position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
header h1{font-size:1rem;font-weight:800;}
header h1 span{color:var(--g4);}
.header-sub{font-size:0.72rem;color:var(--g4);margin-top:2px;display:flex;align-items:center;gap:8px;}
.conn{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.7rem;font-weight:700;}
.conn-ok{background:rgba(37,211,102,0.2);color:var(--wa);}
.conn-err{background:rgba(230,57,70,0.2);color:var(--red);}
.main-tabs{display:flex;background:var(--card);border-bottom:2px solid var(--border);}
.main-tab{flex:1;padding:12px 8px;text-align:center;font-family:'Sora',sans-serif;font-size:0.75rem;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;}
.main-tab.active{color:var(--g4);border-bottom-color:var(--g4);}
.tab-content{display:none;padding:14px;}
.tab-content.active{display:block;}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
@media(min-width:500px){.stats{grid-template-columns:repeat(4,1fr);}}
.stat{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
.stat .val{font-size:1.4rem;font-weight:800;color:var(--g4);}
.stat .lbl{font-size:0.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;margin-top:2px;}
.filter-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:'Sora',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.ftab.active{background:var(--g2);border-color:var(--g3);color:white;}
.ocard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.ocard.Pending{border-left:4px solid var(--acc);}
.ocard.Confirmed{border-left:4px solid var(--g3);}
.ocard.Delivered{border-left:4px solid var(--wa);}
.ocard.Cancelled{border-left:4px solid var(--red);opacity:0.6;}
.ohead{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.oid{font-size:0.68rem;font-weight:700;color:var(--muted);}
.oname{font-size:0.95rem;font-weight:700;}
.ophone{font-size:0.72rem;color:var(--muted);}
.sbadge{padding:4px 10px;border-radius:20px;font-size:0.7rem;font-weight:700;}
.Pending-b{background:rgba(244,162,97,0.2);color:var(--acc);}
.Confirmed-b{background:rgba(64,145,108,0.2);color:var(--g4);}
.Delivered-b{background:rgba(37,211,102,0.15);color:var(--wa);}
.Cancelled-b{background:rgba(230,57,70,0.2);color:var(--red);}
.obody{padding:0 14px 14px;display:none;}
.obody.open{display:block;}
.oitems{background:var(--card2);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.oi{display:flex;justify-content:space-between;font-size:0.83rem;padding:4px 0;border-bottom:1px solid var(--border);}
.oi:last-child{border:none;}
.ometa{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ototal{font-size:1rem;font-weight:800;color:var(--g4);}
.pchip{padding:3px 10px;border-radius:20px;font-size:0.7rem;font-weight:700;background:rgba(108,78,242,0.2);color:#a78bfa;}
.pchip.cod{background:rgba(116,198,157,0.2);color:var(--g4);}
.oaddr{background:var(--card2);border-radius:8px;padding:8px 10px;font-size:0.8rem;color:var(--muted);margin-bottom:10px;}
.oaddr span{color:var(--text);font-weight:600;}
.acts{display:flex;gap:7px;flex-wrap:wrap;}
.abtn{padding:8px 12px;border-radius:10px;border:none;font-family:'Sora',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;flex:1;min-width:70px;}
.a-wa{background:var(--wa);color:white;}
.a-ok{background:var(--g2);color:white;}
.a-del{background:rgba(37,211,102,0.2);color:var(--wa);border:1.5px solid rgba(37,211,102,0.3);}
.a-x{background:rgba(230,57,70,0.15);color:var(--red);border:1.5px solid rgba(230,57,70,0.3);}
.nbadge{display:inline-block;background:var(--acc);color:white;font-size:0.6rem;font-weight:800;padding:2px 6px;border-radius:8px;margin-left:4px;vertical-align:middle;}
.sec{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.sec h3{font-size:0.85rem;font-weight:800;color:var(--g4);margin-bottom:14px;}
.lbl{font-size:0.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;display:block;}
.inp{width:100%;padding:10px 14px;margin-bottom:12px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Sora',sans-serif;font-size:0.9rem;outline:none;}
.inp:focus{border-color:var(--g3);}
.inp::placeholder{color:var(--muted);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbtn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--g2);color:white;font-family:'Sora',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;}
.sbtn:hover{background:var(--g3);}
.sbtn:disabled{opacity:0.5;cursor:not-allowed;}
.vtbl{width:100%;border-collapse:collapse;margin-bottom:10px;}
.vtbl th{background:rgba(64,145,108,0.2);color:var(--g4);font-size:0.68rem;font-weight:700;text-transform:uppercase;padding:8px 6px;text-align:left;}
.vtbl td{padding:5px 3px;border-bottom:1px solid var(--border);vertical-align:middle;}
.ti{width:100%;padding:6px 7px;background:var(--card2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:0.82rem;outline:none;}
.ti:focus{border-color:var(--g3);}
.pc{font-size:0.8rem;font-weight:700;text-align:center;}
.avbtn{width:100%;padding:9px;background:rgba(64,145,108,0.1);border:1.5px dashed var(--g3);border-radius:10px;color:var(--g4);font-family:'Sora',sans-serif;font-size:0.85rem;cursor:pointer;margin-bottom:12px;}
.fab{position:fixed;bottom:20px;right:20px;z-index:100;background:var(--g2);color:white;border:none;width:52px;height:52px;border-radius:16px;font-size:1.4rem;cursor:pointer;box-shadow:0 6px 20px rgba(45,106,79,0.5);}
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.mo.open{opacity:1;pointer-events:all;}
.md{background:var(--card);width:100%;max-width:520px;border-radius:24px 24px 0 0;max-height:90vh;overflow-y:auto;transform:translateY(50px);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);}
.mo.open .md{transform:translateY(0);}
.mh-bar{width:40px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0;}
.mh{padding:14px 20px 10px;border-bottom:1px solid var(--border);}
.mh h2{font-size:1rem;font-weight:800;}
.mf{padding:14px 20px 30px;display:flex;flex-direction:column;gap:10px;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.rbox{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;}
.rbox .rv{font-size:1.5rem;font-weight:800;color:var(--g4);}
.rbox .rl{font-size:0.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;margin-top:2px;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty span{font-size:2.5rem;display:block;margin-bottom:10px;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;font-size:0.85rem;font-weight:600;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <h1>🥬 <span>Owner</span> Dashboard</h1>
  <div class="header-sub"><span id="shopLbl">Loading...</span><span class="conn conn-err" id="cs">⏳ Connecting</span></div>
</header>
<div class="main-tabs">
  <button class="main-tab active" onclick="showTab('orders')">📦 Orders<span id="pb"></span></button>
  <button class="main-tab" onclick="showTab('settings')">⚙️ Settings</button>
  <button class="main-tab" onclick="showTab('sabziyan')">🥬 Sabziyan</button>
  <button class="main-tab" onclick="showTab('report')">📊 Report</button>
</div>
<div class="tab-content active" id="tab_orders">
  <div class="stats" id="statsRow"></div>
  <div class="filter-tabs" id="filterTabs"></div>
  <div id="ordersList"><div class="empty"><span>⏳</span>Load ho raha hai...</div></div>
</div>
<div class="tab-content" id="tab_settings">
  <div class="sec">
    <h3>🏪 Dukaan ki Jankari</h3>
    <label class="lbl">Dukaan ka Naam</label><input class="inp" id="sn" placeholder="Ram Sabzi Dukan">
    <label class="lbl">WhatsApp Number</label><input class="inp" id="sw" placeholder="9876543210" type="tel" maxlength="10">
    <label class="lbl">UPI ID</label><input class="inp" id="su" placeholder="yourname@paytm">
    <div class="row2">
      <div><label class="lbl">Delivery ₹</label><input class="inp" id="sd" placeholder="20" type="number" style="margin:0"></div>
      <div><label class="lbl">Min Order ₹</label><input class="inp" id="sm" placeholder="100" type="number" style="margin:0"></div>
    </div>
    <button class="sbtn" style="margin-top:14px" id="ssBtn" onclick="saveSettings()">💾 Settings Save Karo</button>
  </div>
</div>
<div class="tab-content" id="tab_sabziyan">
  <div class="sec">
    <h3>🥬 Sabzi List</h3>
    <p style="font-size:0.78rem;color:var(--muted);margin-bottom:12px">💡 <b>Buy</b>=Kisan se | <b>Sell</b>=Customer ko | Profit auto</p>
    <div style="overflow-x:auto">
      <table class="vtbl">
        <thead><tr><th>Emoji</th><th>Naam</th><th>Buy₹</th><th>Sell₹</th><th>Unit</th><th>Cat</th><th>On?</th><th>Profit</th><th></th></tr></thead>
        <tbody id="vt"></tbody>
      </table>
    </div>
    <button class="avbtn" onclick="addVeg()">➕ Nayi Sabzi</button>
    <button class="sbtn" id="svBtn" onclick="saveVegs()">💾 Save — Customer Page Update Hogi ✅</button>
  </div>
</div>
<div class="tab-content" id="tab_report">
  <div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:14px;flex-wrap:wrap">
    <div><label class="lbl">Date</label><input type="date" class="inp" id="rd" style="margin:0;width:auto"></div>
    <button class="sbtn" style="width:auto;padding:10px 16px" onclick="setToday()">Aaj</button>
    <button class="sbtn" style="width:auto;padding:10px 16px;background:var(--card2);border:1.5px solid var(--border)" onclick="document.getElementById('rd').value='';renderReport()">Sab</button>
  </div>
  <div class="rgrid" id="rb"></div>
  <div class="sec"><h3>📈 Sabzi Profit</h3>
    <table style="width:100%;border-collapse:collapse"><thead><tr>
      <th style="background:rgba(64,145,108,0.2);color:var(--g4);font-size:0.7rem;padding:8px;text-align:left">Sabzi</th>
      <th style="background:rgba(64,145,108,0.2);color:var(--g4);font-size:0.7rem;padding:8px;text-align:right">Sold</th>
      <th style="background:rgba(64,145,108,0.2);color:var(--g4);font-size:0.7rem;padding:8px;text-align:right">Revenue</th>
      <th style="background:rgba(64,145,108,0.2);color:var(--g4);font-size:0.7rem;padding:8px;text-align:right">Cost</th>
      <th style="background:rgba(64,145,108,0.2);color:var(--g4);font-size:0.7rem;padding:8px;text-align:right">Profit</th>
    </tr></thead><tbody id="rvt"></tbody></table>
  </div>
</div>
<button class="fab" onclick="openM()">➕</button>
<div class="mo" id="addM">
  <div class="md">
    <div class="mh-bar"></div>
    <div class="mh"><h2>📝 Manual Order</h2></div>
    <div class="mf">
      <div><label class="lbl">Customer Naam</label><input class="inp" id="mn" placeholder="Ramesh Kumar" style="margin:0"></div>
      <div><label class="lbl">Mobile</label><input class="inp" id="mp" placeholder="9876543210" type="tel" style="margin:0"></div>
      <div><label class="lbl">Address</label><input class="inp" id="ma" placeholder="Gali 3..." style="margin:0"></div>
      <div><label class="lbl">Items</label><textarea class="inp" id="mi" rows="3" placeholder="Tamatar 2kg&#10;Aloo 3kg" style="resize:none;margin:0"></textarea></div>
      <div class="row2">
        <div><label class="lbl">Total ₹</label><input class="inp" id="mt" type="number" placeholder="250" style="margin:0"></div>
        <div><label class="lbl">Payment</label><select class="inp" id="mk" style="margin:0"><option value="UPI">💳 UPI</option><option value="COD">💵 COD</option></select></div>
      </div>
      <button class="sbtn" id="moBtn" onclick="addManual()">✅ Save</button>
      <button onclick="closeM()" style="background:none;border:none;color:var(--muted);padding:8px;font-family:'Sora',sans-serif;cursor:pointer;text-align:center">Cancel</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// =============================================
// SUPABASE CONFIG — Direct XMLHttpRequest
// No library needed — works everywhere!
// =============================================
const URL_ = 'https://oymfccjppvdtmgnnixye.supabase.co/rest/v1/';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95bWZjY2pwcHZkdG1nbm5peHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjUwMjAsImV4cCI6MjA4NzcwMTAyMH0.Tfvo_4jYSOX3QXNM00mhOlwAvkOD8O_GnZHRcv5-Kqk';

function api(table, method, body, query) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open(method || 'GET', URL_ + table + (query || ''));
    xhr.setRequestHeader('apikey', KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + KEY);
    xhr.setRequestHeader('Content-Type', 'application/json');
    if (method === 'POST') xhr.setRequestHeader('Prefer', 'return=representation');
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText || '[]')); }
        catch(e) { resolve([]); }
      } else {
        reject(new Error('HTTP ' + xhr.status + ': ' + xhr.responseText));
      }
    };
    xhr.onerror = function() { reject(new Error('Network error — internet check karo')); };
    xhr.send(body ? JSON.stringify(body) : null);
  });
}

var S={}, V=[], O=[], AF='Sab', AT='orders', LC=0;

async function init() {
  try {
    // Load settings
    var sd = await api('settings','GET',null,'?id=eq.main');
    if (sd && sd.length) {
      S = sd[0];
    } else {
      var def={id:'main',shop_name:'Hari Sabzi',wa_num:'',upi:'',delivery:20,min_order:100};
      await api('settings','POST',def);
      S = def;
    }
    document.getElementById('shopLbl').textContent = S.shop_name || 'Sabzi Dukan';
    document.getElementById('sn').value = S.shop_name||'';
    document.getElementById('sw').value = S.wa_num||'';
    document.getElementById('su').value = S.upi||'';
    document.getElementById('sd').value = S.delivery||0;
    document.getElementById('sm').value = S.min_order||0;

    // Load vegs
    var vd = await api('vegetables','GET',null,'?order=id.asc');
    V = vd || [];
    if (!V.length) {
      var defs=[
        {emoji:'🍅',name:'Tamatar',buy_price:20,sell_price:35,unit:'kg',category:'Sabzi',available:true},
        {emoji:'🥔',name:'Aloo',buy_price:18,sell_price:28,unit:'kg',category:'Sabzi',available:true},
        {emoji:'🧅',name:'Pyaaz',buy_price:22,sell_price:35,unit:'kg',category:'Sabzi',available:true},
        {emoji:'🌿',name:'Dhaniya',buy_price:10,sell_price:20,unit:'bunch',category:'Patta',available:true},
        {emoji:'🍆',name:'Baingan',buy_price:25,sell_price:40,unit:'kg',category:'Sabzi',available:true},
        {emoji:'🧄',name:'Lahsun',buy_price:70,sell_price:100,unit:'kg',category:'Masala',available:true},
      ];
      for(var i=0;i<defs.length;i++) await api('vegetables','POST',defs[i]);
      V = await api('vegetables','GET',null,'?order=id.asc');
    }

    // Load orders
    await loadOrders();

    document.getElementById('cs').textContent = '🟢 Connected';
    document.getElementById('cs').className = 'conn conn-ok';
    renderAll();

    setInterval(async function(){
      if(AT==='orders'){
        await loadOrders();
        if(O.length>LC){toast('🔔 Naya order aaya!');renderAll();}
        LC=O.length;
      }
    }, 8000);
  } catch(e) {
    document.getElementById('cs').textContent = '🔴 ' + e.message;
    document.getElementById('ordersList').innerHTML = '<div class="empty"><span>❌</span><p>'+e.message+'</p></div>';
  }
}

async function loadOrders() {
  var od = await api('orders','GET',null,'?order=created_at.desc');
  O = od || [];
  LC = O.length;
}

// SETTINGS
async function saveSettings() {
  var btn=document.getElementById('ssBtn');
  btn.disabled=true;btn.textContent='⏳ Saving...';
  var d={shop_name:document.getElementById('sn').value.trim()||'Hari Sabzi',wa_num:document.getElementById('sw').value.trim(),upi:document.getElementById('su').value.trim(),delivery:parseFloat(document.getElementById('sd').value)||0,min_order:parseFloat(document.getElementById('sm').value)||0};
  try {
    await api('settings','PATCH',d,'?id=eq.main');
    S={...S,...d};
    document.getElementById('shopLbl').textContent=d.shop_name;
    toast('✅ Settings save! Customer page update ho gayi!');
  } catch(e){toast('❌ '+e.message);}
  btn.disabled=false;btn.textContent='💾 Settings Save Karo';
}

// VEGS
function renderVegs() {
  document.getElementById('vt').innerHTML = V.map(function(v){
    var p=(v.sell_price||0)-(v.buy_price||0);
    var pc=p>0?'var(--g4)':p<0?'var(--red)':'var(--muted)';
    return '<tr id="vr_'+v.id+'"><td><input class="ti" value="'+(v.emoji||'🥬')+'" style="width:38px;text-align:center;font-size:1.1rem"></td><td><input class="ti" value="'+v.name+'" style="min-width:60px"></td><td><input class="ti" type="number" value="'+(v.buy_price||0)+'" style="width:50px" oninput="cp('+v.id+')"></td><td><input class="ti" type="number" value="'+(v.sell_price||0)+'" style="width:50px" oninput="cp('+v.id+')"></td><td><select class="ti" style="width:60px">'+['kg','bunch','piece','500g'].map(function(u){return '<option '+(v.unit===u?'selected':'')+'>'+u+'</option>';}).join('')+'</select></td><td><select class="ti" style="width:60px">'+['Sabzi','Patta','Masala','Fruit'].map(function(c){return '<option '+(v.category===c?'selected':'')+'>'+c+'</option>';}).join('')+'</select></td><td style="text-align:center"><input type="checkbox" '+(v.available?'checked':'')+' style="width:16px;height:16px;cursor:pointer"></td><td class="pc" id="pc_'+v.id+'" style="color:'+pc+'">₹'+p+'</td><td><button onclick="delV('+v.id+')" style="background:rgba(230,57,70,0.2);border:none;color:var(--red);border-radius:8px;padding:5px 8px;cursor:pointer">✕</button></td></tr>';
  }).join('');
}
function cp(id){
  var r=document.getElementById('vr_'+id);if(!r)return;
  var n=r.querySelectorAll('input[type="number"]');
  var p=(parseFloat(n[1].value)||0)-(parseFloat(n[0].value)||0);
  var e=document.getElementById('pc_'+id);
  if(e){e.textContent='₹'+p;e.style.color=p>0?'var(--g4)':p<0?'var(--red)':'var(--muted)';}
}
function addVeg(){
  var tmp='new_'+Date.now();
  var tr=document.createElement('tr');tr.id='vr_'+tmp;
  tr.innerHTML='<td><input class="ti" value="🥬" style="width:38px;text-align:center;font-size:1.1rem"></td><td><input class="ti" placeholder="Naam" style="min-width:60px"></td><td><input class="ti" type="number" value="0" style="width:50px"></td><td><input class="ti" type="number" value="0" style="width:50px"></td><td><select class="ti" style="width:60px">'+['kg','bunch','piece','500g'].map(function(u){return '<option>'+u+'</option>';}).join('')+'</select></td><td><select class="ti" style="width:60px">'+['Sabzi','Patta','Masala','Fruit'].map(function(c){return '<option>'+c+'</option>';}).join('')+'</select></td><td style="text-align:center"><input type="checkbox" checked style="width:16px;height:16px;cursor:pointer"></td><td class="pc">₹0</td><td><button onclick="this.closest(\'tr\').remove()" style="background:rgba(230,57,70,0.2);border:none;color:var(--red);border-radius:8px;padding:5px 8px;cursor:pointer">✕</button></td>';
  document.getElementById('vt').appendChild(tr);
}
async function delV(id){
  if(!confirm('Delete karein?'))return;
  try{await api('vegetables','DELETE',null,'?id=eq.'+id);V=V.filter(function(v){return v.id!==id;});renderVegs();toast('✅ Delete ho gayi');}
  catch(e){toast('❌ '+e.message);}
}
async function saveVegs(){
  var btn=document.getElementById('svBtn');btn.disabled=true;btn.textContent='⏳ Saving...';
  try {
    var rows=document.querySelectorAll('#vt tr');
    for(var i=0;i<rows.length;i++){
      var row=rows[i];
      var id=row.id.replace('vr_','');
      var inp=row.querySelectorAll('input');
      var sel=row.querySelectorAll('select');
      var d={emoji:inp[0].value||'🥬',name:inp[1].value.trim(),buy_price:parseFloat(inp[2].value)||0,sell_price:parseFloat(inp[3].value)||0,unit:sel[0].value,category:sel[1].value,available:inp[4].checked};
      if(!d.name)continue;
      if(id.startsWith('new_')){await api('vegetables','POST',d);}
      else{await api('vegetables','PATCH',d,'?id=eq.'+id);}
    }
    var vd=await api('vegetables','GET',null,'?order=id.asc');
    V=vd||[];renderVegs();
    toast('✅ Sabziyan save! Customer page pe turant dikhengi!');
  } catch(e){toast('❌ '+e.message);}
  btn.disabled=false;btn.textContent='💾 Save — Customer Page Update Hogi ✅';
}

// ORDERS
function ta(ts){var m=Math.floor((Date.now()-new Date(ts))/60000),h=Math.floor(m/60);if(m<1)return 'Abhi abhi';if(m<60)return m+'min pehle';if(h<24)return h+'hr pehle';return new Date(ts).toLocaleDateString('hi-IN');}
function renderStats(){
  var t=new Date().toDateString();
  var to=O.filter(function(o){return new Date(o.created_at).toDateString()===t;});
  var tv=to.filter(function(o){return o.status!=='Cancelled';}).reduce(function(a,o){return a+(o.total||0);},0);
  var p=O.filter(function(o){return o.status==='Pending';}).length;
  document.getElementById('statsRow').innerHTML='<div class="stat"><div class="val">'+O.length+'</div><div class="lbl">Total</div></div><div class="stat"><div class="val" style="color:var(--acc)">'+p+'</div><div class="lbl">⏳ Pending</div></div><div class="stat"><div class="val">₹'+tv+'</div><div class="lbl">Aaj Revenue</div></div><div class="stat"><div class="val">'+to.length+'</div><div class="lbl">Aaj Orders</div></div>';
  document.getElementById('pb').innerHTML=p>0?'<span class="nbadge">'+p+'</span>':'';
}
function renderFT(){
  var ss=['Sab','Pending','Confirmed','Delivered','Cancelled'];
  document.getElementById('filterTabs').innerHTML=ss.map(function(s){var c=s==='Sab'?O.length:O.filter(function(o){return o.status===s;}).length;return '<button class="ftab '+(s===AF?'active':'')+'" onclick="setF(\''+s+'\')">'+s+' ('+c+')</button>';}).join('');
}
function setF(s){AF=s;renderFT();renderOrders();}
function renderOrders(){
  var f=AF==='Sab'?O:O.filter(function(o){return o.status===AF;});
  var el=document.getElementById('ordersList');
  if(!f.length){el.innerHTML='<div class="empty"><span>📋</span><p>Koi order nahi</p></div>';return;}
  el.innerHTML=f.map(function(o){
    var items=[];try{items=Array.isArray(o.items)?o.items:JSON.parse(o.items||'[]');}catch(e){}
    var sc=o.status+'-b';
    var isNew=(Date.now()-new Date(o.created_at))<300000&&o.status==='Pending';
    return '<div class="ocard '+o.status+'"><div class="ohead" onclick="this.nextElementSibling.classList.toggle(\'open\')"><div><div class="oid">'+o.id+(isNew?'<span class="nbadge">NEW</span>':'')+'  ·  '+ta(o.created_at)+'</div><div class="oname">'+o.customer_name+'</div><div class="ophone">📱 '+o.phone+'</div></div><div style="text-align:right"><span class="sbadge '+sc+'">'+o.status+'</span><div style="font-size:0.9rem;font-weight:800;color:var(--g4);margin-top:4px">₹'+(o.total||'?')+'</div></div></div><div class="obody"><div class="oaddr">📍 <span>'+(o.address||'—')+'</span></div><div class="oitems">'+items.map(function(it){return '<div class="oi"><span>'+it+'</span></div>';}).join('')+'</div><div class="ometa"><div class="ototal">Total: ₹'+(o.total||'?')+'</div><span class="pchip '+(o.pay_mode==='COD'?'cod':'')+'">'+(o.pay_mode==='COD'?'💵 COD':'💳 UPI')+'</span></div><div class="acts"><button class="abtn a-wa" onclick="waM(\''+o.id+'\',\''+o.customer_name+'\',\''+o.phone+'\',\''+o.status+'\')">📲 WA</button>'+(o.status==='Pending'?'<button class="abtn a-ok" onclick="setSt(\''+o.id+'\',\'Confirmed\')">✅ Confirm</button>':'')+(o.status==='Confirmed'?'<button class="abtn a-del" onclick="setSt(\''+o.id+'\',\'Delivered\')">🚚 Delivered</button>':'')+(o.status!=='Cancelled'&&o.status!=='Delivered'?'<button class="abtn a-x" onclick="setSt(\''+o.id+'\',\'Cancelled\')">❌ Cancel</button>':'')+'</div></div></div>';
  }).join('');
}
async function setSt(id,st){
  try{await api('orders','PATCH',{status:st},'?id=eq.'+id);await loadOrders();renderAll();toast('Order '+st+' ✅');}
  catch(e){toast('❌ '+e.message);}
}
function waM(id,name,phone,st){
  var msgs={Pending:'✅ Haan *'+name+'* ji! Order ('+id+') mil gaya 🥬',Confirmed:'✅ *'+name+'* ji, confirm! Jald aayega 🛵',Delivered:'✅ *'+name+'* ji, deliver ho gaya. Shukriya! 🙏',Cancelled:'❌ *'+name+'* ji, order cancel ho gaya.'};
  window.open('https://wa.me/91'+phone+'?text='+encodeURIComponent(msgs[st]||'Order update: '+st),'_blank');
}

// MANUAL ORDER
function openM(){document.getElementById('addM').classList.add('open');}
function closeM(){document.getElementById('addM').classList.remove('open');}
async function addManual(){
  var name=document.getElementById('mn').value.trim();
  var phone=document.getElementById('mp').value.trim();
  if(!name||!phone){toast('❌ Naam aur number zaruri!');return;}
  var btn=document.getElementById('moBtn');btn.disabled=true;btn.textContent='⏳...';
  try{
    var o={id:'ORD'+Date.now().toString().slice(-6),customer_name:name,phone:phone,address:document.getElementById('ma').value.trim()||'—',items:JSON.stringify(document.getElementById('mi').value.trim().split('\n').filter(Boolean)),total:parseFloat(document.getElementById('mt').value)||0,pay_mode:document.getElementById('mk').value,status:'Pending'};
    await api('orders','POST',o);
    await loadOrders();renderAll();closeM();
    ['mn','mp','ma','mi','mt'].forEach(function(id){document.getElementById(id).value='';});
    toast('✅ Order add ho gaya!');
  }catch(e){toast('❌ '+e.message);}
  btn.disabled=false;btn.textContent='✅ Save';
}
document.getElementById('addM').addEventListener('click',function(e){if(e.target===this)closeM();});

// REPORT
function setToday(){document.getElementById('rd').value=new Date().toISOString().split('T')[0];renderReport();}
function renderReport(){
  var date=document.getElementById('rd').value;
  var f=date?O.filter(function(o){return new Date(o.created_at).toISOString().split('T')[0]===date;}):O;
  var ac=f.filter(function(o){return o.status!=='Cancelled';});
  var rev=ac.reduce(function(a,o){return a+(o.total||0);},0);
  var del=ac.length*(S.delivery||0);
  var cost=0;
  ac.forEach(function(o){
    var items=[];try{items=Array.isArray(o.items)?o.items:JSON.parse(o.items||'[]');}catch(e){}
    items.forEach(function(it){
      var v=V.find(function(v){return it.indexOf(v.name)!==-1;});
      if(v){var qm=it.match(/(\d+\.?\d*)/);cost+=(qm?parseFloat(qm[1]):1)*(v.buy_price||0);}
    });
  });
  document.getElementById('rb').innerHTML='<div class="rbox"><div class="rv">₹'+rev.toFixed(0)+'</div><div class="rl">💰 Revenue</div></div><div class="rbox" style="border-color:rgba(244,162,97,0.4)"><div class="rv" style="color:var(--acc)">₹'+(rev-del-cost).toFixed(0)+'</div><div class="rl">📈 Profit</div></div><div class="rbox" style="border-color:rgba(230,57,70,0.3)"><div class="rv" style="color:var(--red)">₹'+cost.toFixed(0)+'</div><div class="rl">💸 Cost</div></div><div class="rbox"><div class="rv">'+ac.length+'</div><div class="rl">📦 Orders</div></div>';
  var bv={};
  ac.forEach(function(o){
    var items=[];try{items=Array.isArray(o.items)?o.items:JSON.parse(o.items||'[]');}catch(e){}
    items.forEach(function(it){
      var v=V.find(function(v){return it.indexOf(v.name)!==-1;});if(!v)return;
      var qm=it.match(/(\d+\.?\d*)/);var qty=qm?parseFloat(qm[1]):1;
      if(!bv[v.name])bv[v.name]={qty:0,rev:0,cost:0,emoji:v.emoji||''};
      bv[v.name].qty+=qty;bv[v.name].rev+=qty*(v.sell_price||0);bv[v.name].cost+=qty*(v.buy_price||0);
    });
  });
  var en=Object.entries(bv);
  document.getElementById('rvt').innerHTML=en.length?en.map(function(e){return '<tr><td style="padding:8px;font-size:0.85rem"><b>'+e[1].emoji+' '+e[0]+'</b></td><td style="padding:8px;text-align:right">'+e[1].qty.toFixed(1)+'</td><td style="padding:8px;text-align:right">₹'+e[1].rev.toFixed(0)+'</td><td style="padding:8px;text-align:right">₹'+e[1].cost.toFixed(0)+'</td><td style="padding:8px;font-weight:800;text-align:right;color:var(--g4)">₹'+(e[1].rev-e[1].cost).toFixed(0)+'</td></tr>';}).join(''):'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--muted)">Koi data nahi</td></tr>';
}

// TABS
function showTab(t){
  AT=t;
  document.querySelectorAll('.main-tab').forEach(function(b,i){b.classList.toggle('active',['orders','settings','sabziyan','report'][i]===t);});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  document.getElementById('tab_'+t).classList.add('active');
  if(t==='sabziyan')renderVegs();
  if(t==='report'){setToday();renderReport();}
}
function renderAll(){renderStats();renderFT();renderOrders();}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3000);}

init();
</script>
</body>
